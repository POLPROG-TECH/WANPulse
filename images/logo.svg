<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#81d4fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#64b5f6" stroke-width="3" opacity="0.4"/>

  <!-- Globe grid lines (subtle) -->
  <ellipse cx="256" cy="256" rx="120" ry="160" fill="none" stroke="#1e88e5" stroke-width="1.5" opacity="0.35"/>
  <ellipse cx="256" cy="256" rx="60" ry="160" fill="none" stroke="#1e88e5" stroke-width="1.5" opacity="0.25"/>
  <line x1="136" y1="200" x2="376" y2="200" stroke="#1e88e5" stroke-width="1" opacity="0.25"/>
  <line x1="136" y1="312" x2="376" y2="312" stroke="#1e88e5" stroke-width="1" opacity="0.25"/>

  <!-- Pulse/heartbeat line (the hero element) -->
  <polyline
    points="60,260 130,260 160,260 185,260 210,310 230,180 256,340 282,140 304,300 326,210 346,260 376,260 420,260 452,260"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Connection dots on pulse -->
  <circle cx="230" cy="180" r="5" fill="#81d4fa" opacity="0.8"/>
  <circle cx="256" cy="340" r="5" fill="#81d4fa" opacity="0.8"/>
  <circle cx="282" cy="140" r="5" fill="#4fc3f7" opacity="0.9"/>
  <circle cx="304" cy="300" r="5" fill="#81d4fa" opacity="0.8"/>

  <!-- Small signal rings (top-right, representing connectivity) -->
  <path d="M 370 130 A 30 30 0 0 1 400 100" fill="none" stroke="#80cbc4" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M 362 138 A 45 45 0 0 1 407 93" fill="none" stroke="#80cbc4" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M 354 146 A 60 60 0 0 1 414 86" fill="none" stroke="#80cbc4" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

  <!-- Status dot (green = healthy) -->
  <circle cx="385" cy="115" r="8" fill="#66bb6a">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
