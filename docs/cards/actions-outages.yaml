# WANPulse - Quick Actions & Outage Info Card
#
# A row with the "Test Connection" button and an outage counter.
# Press the button to run a probe cycle immediately.
#
# How to add:
#   1. Open your dashboard, click pencil icon (Edit)
#   2. Click "+ Add Card" > "Manual"
#   3. Paste this YAML and click "Save"

type: grid
columns: 2
square: false
cards:
  - type: button
    entity: button.wanpulse_probe_now
    name: "🔄 Test Connection Now"
    icon: mdi:network-check
    tap_action:
      action: toggle
    show_state: false
    icon_height: 48px

  - type: entities
    title: "⚠️ Outage Summary"
    entities:
      - entity: sensor.wanpulse_outage_count_24h
        name: Outages (24h)
        icon: mdi:alert-circle-outline
      - entity: binary_sensor.wanpulse_wan_status
        name: Current Status
        icon: mdi:wan
